<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: transparent; overflow: hidden; }
        #link {
            display: none;
            padding: 5px 8px;
        }
        #link a {
            display: inline-block;
            padding: 3px 10px;
            font-size: 13px;
            color: #adb5bd;
            border: 1px solid #6c757d;
            border-radius: 4px;
            text-decoration: none;
            font-family: sans-serif;
        }
        #link a:hover { color: #fff; border-color: #adb5bd; }
    </style>
</head>
<body>
    <div id="link">
        <a href="recordings-browser.html" target="_blank">&#127897; View Archived Recordings</a>
    </div>
    <script>
        (async function () {
            try {
                const r = await fetch("master/auth/check");
                const data = await r.json();
                if (data === "Logged In") {
                    const el = document.getElementById("link");
                    el.style.display = "block";
                    if (window.frameElement) {
                        window.frameElement.style.height = (el.offsetHeight + 2) + "px";
                        window.frameElement.style.minHeight = "0";
                    }
                }
            } catch (e) {
                console.error("Archive widget auth check failed:", e);
            }
        })();
    </script>
</body>
</html>
