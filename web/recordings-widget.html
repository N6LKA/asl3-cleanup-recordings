<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: transparent; overflow: hidden; height: 0; }
        #link {
            display: none;
            padding: 5px 8px;
        }
        #link a {
            display: inline-block;
            padding: 3px 10px;
            font-size: 13px;
            color: #adb5bd;
            border: 1px solid #6c757d;
            border-radius: 4px;
            text-decoration: none;
            font-family: sans-serif;
        }
        #link a:hover { color: #fff; border-color: #adb5bd; }
    </style>
</head>
<body>
    <div id="link">
        <a href="recordings-browser.html" target="_blank">&#127897; View Archived Recordings</a>
    </div>
    <script>
        var loggedIn = false;

        function setHeight(px) {
            document.documentElement.style.height = px + "px";
            document.body.style.height = px + "px";
            if (window.frameElement) {
                window.frameElement.style.height = px + "px";
                window.frameElement.style.minHeight = "0";
            }
        }

        async function checkAuth() {
            try {
                const r = await fetch("master/auth/check");
                const data = await r.json();
                const nowLoggedIn = (data === "Logged In" || data?.SUCCESS === "Logged In");

                if (nowLoggedIn !== loggedIn) {
                    loggedIn = nowLoggedIn;
                    const el = document.getElementById("link");
                    if (loggedIn) {
                        el.style.display = "block";
                        requestAnimationFrame(() => setHeight(el.offsetHeight + 2));
                    } else {
                        el.style.display = "none";
                        setHeight(0);
                    }
                }
            } catch (_) {}
        }

        // Check immediately, then poll every 5 seconds
        checkAuth();
        setInterval(checkAuth, 5000);
    </script>
</body>
</html>
