<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Archive</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; color: #dee2e6; }

        .page-header {
            padding: 1.25rem 0 1rem;
            border-bottom: 1px solid #495057;
            margin-bottom: 1.25rem;
        }
        .page-header h4 { margin: 0; }
        .page-header p  { margin: 0.25rem 0 0; color: #6c757d; font-size: 0.875rem; }

        /* two-column layout */
        .layout { display: flex; gap: 1.5rem; align-items: flex-start; }
        .col-archive  { flex: 1; min-width: 0; }
        .col-settings { width: 270px; flex-shrink: 0; }
        @media (max-width: 767px) {
            .layout { flex-direction: column; }
            .col-settings { width: 100%; }
        }

        /* recordings list */
        .date-group { margin: 0 0 1.75rem; }
        .date-header {
            background: #2c3136;
            border-left: 3px solid #495057;
            padding: 0.4rem 0.75rem;
            border-radius: 3px;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #adb5bd;
            cursor: pointer;
            user-select: none;
        }
        .date-header:hover { background: #343a40; }
        .chevron { display: inline-block; width: 1em; }
        .group-body { margin-bottom: 0; }
        table { font-size: 0.875rem; margin-bottom: 0; }
        td, th { vertical-align: middle !important; }
        .col-time { width: 70px; white-space: nowrap; }
        .col-dur  { width: 60px; white-space: nowrap; color: #adb5bd; }
        .col-size { width: 80px; white-space: nowrap; color: #6c757d; }
        .col-play { width: 185px; text-align: right; white-space: nowrap; }
        .list-controls {
            font-size: 0.8rem;
            margin-bottom: 0.6rem;
            display: none;
        }
        .list-controls button {
            background: none; border: none; padding: 0;
            color: #6c757d; cursor: pointer; font-size: inherit;
        }
        .list-controls button:hover { color: #adb5bd; }
        .disk-usage { font-size: 0.8rem; color: #6c757d; margin-bottom: 0.75rem; }
        .player-row td { padding: 0.5rem 1rem !important; background: #1a1d20 !important; }
        audio { width: 100%; height: 36px; }
        #status { padding: 3rem 0; text-align: center; }

        /* settings panel */
        .settings-card {
            background: #2c3136;
            border: 1px solid #495057;
            border-radius: 6px;
            padding: 1rem;
        }
        .settings-card h6 {
            color: #adb5bd;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #495057;
        }
        .settings-card label {
            font-size: 0.8rem;
            color: #adb5bd;
            margin-bottom: 0.25rem;
            display: block;
        }
        .settings-card .form-control,
        .settings-card .form-select {
            background: #1a1d20;
            color: #dee2e6;
            border-color: #495057;
            font-size: 0.85rem;
        }
        .settings-card .form-control:focus,
        .settings-card .form-select:focus {
            background: #1a1d20;
            color: #dee2e6;
            border-color: #6c757d;
            box-shadow: none;
        }
        .days-row { display: flex; align-items: center; gap: 0.5rem; }
        .days-row input { width: 80px; }
        .days-row span  { color: #6c757d; font-size: 0.85rem; }
        #save-status, #run-status {
            font-size: 0.8rem;
            min-height: 1.2em;
            margin-top: 0.4rem;
        }
        .settings-footer {
            margin-top: 0.75rem;
            font-size: 0.72rem;
            color: #6c757d;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div style="max-width: 1100px; margin: 0 auto; padding: 0 1rem;">

    <div class="page-header">
        <h4 id="page-title">&#127897; Audio Archive</h4>
        <p>Individual transmission recordings &bull; newest first</p>
    </div>

    <div class="layout">

        <!-- recordings list -->
        <div class="col-archive">
            <div class="list-controls" id="list-controls">
                <button onclick="expandAll()">expand all</button>
                <span style="color:#495057; margin:0 0.35rem">·</span>
                <button onclick="collapseAll()">collapse all</button>
            </div>
            <div id="status">
                <div class="spinner-border text-secondary" role="status" id="spinner"></div>
                <p class="mt-2 text-muted" id="status-text">Loading recordings&hellip;</p>
            </div>
            <div id="archive-content"></div>
        </div>

        <!-- settings panel -->
        <div class="col-settings">
            <div class="settings-card" id="settings-panel" style="display:none">
                <h6>Cleanup Settings</h6>
                <div class="disk-usage" id="disk-usage"></div>

                <div class="mb-3">
                    <label>Keep recordings for</label>
                    <div class="days-row">
                        <input type="number" id="days-to-keep" class="form-control"
                               min="1" max="365" value="14">
                        <span>days</span>
                    </div>
                </div>

                <div class="mb-2">
                    <label>Cleanup frequency</label>
                    <select id="sched-freq" class="form-select" onchange="updateSchedUI()">
                        <option value="daily">Daily</option>
                        <option value="weekly" selected>Weekly</option>
                        <option value="monthly">Monthly (1st of month)</option>
                    </select>
                </div>

                <div class="mb-2" id="dow-group">
                    <label>Day of week</label>
                    <select id="sched-dow" class="form-select">
                        <option value="0">Sunday</option>
                        <option value="1">Monday</option>
                        <option value="2">Tuesday</option>
                        <option value="3">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="5">Friday</option>
                        <option value="6">Saturday</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label>Run at</label>
                    <select id="sched-hour" class="form-select"></select>
                </div>

                <button class="btn btn-sm btn-primary w-100"
                        onclick="saveSettings()">Save Settings</button>
                <div id="save-status"></div>

                <hr style="border-color:#495057; margin: 0.9rem 0;">

                <button class="btn btn-sm btn-outline-warning w-100"
                        onclick="runNow()">Run Cleanup Now</button>
                <div id="run-status"></div>

                <div class="settings-footer" id="settings-footer"></div>
            </div>
        </div>

    </div>
</div>

<script>
    // ── Hour dropdown ────────────────────────────────────────────────────────────
    (function () {
        const sel = document.getElementById('sched-hour');
        ['12:00 AM (midnight)','1:00 AM','2:00 AM','3:00 AM','4:00 AM','5:00 AM',
         '6:00 AM','7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM',
         '12:00 PM (noon)','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM',
         '6:00 PM','7:00 PM','8:00 PM','9:00 PM','10:00 PM','11:00 PM'
        ].forEach((label, h) => {
            const o = document.createElement('option');
            o.value = h; o.textContent = label; sel.appendChild(o);
        });
    })();

    function updateSchedUI() {
        document.getElementById('dow-group').style.display =
            document.getElementById('sched-freq').value === 'weekly' ? '' : 'none';
    }

    // ── Formatting helpers ───────────────────────────────────────────────────────
    function fmtSize(b) {
        return b < 1048576 ? (b/1024).toFixed(0)+' KB' : (b/1048576).toFixed(1)+' MB';
    }
    function fmtDate(iso) {
        return new Date(iso+'T12:00:00').toLocaleDateString('en-US',
            {weekday:'long',year:'numeric',month:'long',day:'numeric'});
    }
    function fmtDur(s) {
        if (s == null || s <= 0) return '—';
        const m = Math.floor(s / 60), sec = Math.round(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
    }
    function fmtBytes(b) {
        if (b == null) return '—';
        if (b >= 1e9)  return (b / 1e9).toFixed(1) + ' GB';
        if (b >= 1e6)  return (b / 1e6).toFixed(1) + ' MB';
        return (b / 1e3).toFixed(0) + ' KB';
    }

    // ── Date group collapse ──────────────────────────────────────────────────────
    function toggleGroup(header) {
        const body = header.nextElementSibling;
        const chevron = header.querySelector('.chevron');
        const collapsed = body.style.display === 'none';
        body.style.display = collapsed ? '' : 'none';
        chevron.textContent = collapsed ? '▾' : '▸';
    }

    function expandAll() {
        document.querySelectorAll('.date-group').forEach(g => {
            g.querySelector('.group-body').style.display = '';
            g.querySelector('.chevron').textContent = '▾';
        });
    }
    function collapseAll() {
        document.querySelectorAll('.date-group').forEach(g => {
            g.querySelector('.group-body').style.display = 'none';
            g.querySelector('.chevron').textContent = '▸';
        });
    }

    // ── Audio player ─────────────────────────────────────────────────────────────
    function closeAllPlayers() {
        document.querySelectorAll('.player-row').forEach(row => {
            row.style.display = 'none';
            const a = row.querySelector('audio'); a.pause(); a.src = '';
        });
        document.querySelectorAll('.play-btn').forEach(b => {
            b.textContent = '▶ Play';
            b.classList.replace('btn-secondary','btn-outline-primary');
        });
    }

    function togglePlay(btn, filename) {
        const playerRow = btn.closest('tr').nextElementSibling;
        const isOpen    = playerRow.style.display === 'table-row';
        closeAllPlayers();
        if (isOpen) return;
        playerRow.style.display = 'table-row';
        btn.textContent = '⏹ Stop';
        btn.classList.replace('btn-outline-primary','btn-secondary');
        const audio = playerRow.querySelector('audio');
        audio.src = '/allmon3/archive/api/file/' + encodeURIComponent(filename);
        audio.play().catch(() => {});
    }

    // ── Recordings list ──────────────────────────────────────────────────────────
    const knownFilenames = new Set();

    function buildRowHtml(r) {
        const fn  = r.filename.replace(/'/g, "\\'");
        const url = '/allmon3/archive/api/file/' + encodeURIComponent(r.filename);
        return `<tr>`
            + `<td class="col-time">${r.time}</td>`
            + `<td class="col-dur">${fmtDur(r.duration)}</td>`
            + `<td class="col-size">${fmtSize(r.size)}</td>`
            + `<td class="col-play">`
            + `<button class="btn btn-sm btn-outline-primary play-btn" onclick="togglePlay(this,'${fn}')">&#9654; Play</button>`
            + ` <a class="btn btn-sm btn-outline-secondary" href="${url}" download="${r.filename}" title="Download">&#11015;</a>`
            + `</td></tr>`
            + `<tr class="player-row" style="display:none"><td colspan="4"><audio controls preload="none"></audio></td></tr>`;
    }

    function createGroupDiv(date, recs, expanded) {
        const div = document.createElement('div');
        div.className    = 'date-group';
        div.dataset.date = date;
        let html = `<div class="date-header" onclick="toggleGroup(this)">`
            + `<span class="chevron">${expanded ? '▾' : '▸'}</span> ${fmtDate(date)}`
            + ` <span class="fw-normal text-muted rec-count">`
            + `(${recs.length} transmission${recs.length !== 1 ? 's' : ''})</span></div>`
            + `<div class="group-body" style="display:${expanded ? '' : 'none'}">`
            + `<table class="table table-dark table-hover table-sm">`
            + `<thead><tr><th class="col-time">Time</th><th class="col-dur">Duration</th>`
            + `<th class="col-size">Size</th><th class="col-play"></th>`
            + `</tr></thead><tbody>`;
        recs.forEach(r => { html += buildRowHtml(r); });
        html += '</tbody></table></div>';
        div.innerHTML = html;
        return div;
    }

    function buildContent(records) {
        const today = new Date().toLocaleDateString('en-CA');
        const groups = {};
        records.forEach(r => {
            if (r.size === 0) return; // still being written — pick up on next refresh
            knownFilenames.add(r.filename);
            (groups[r.date] = groups[r.date] || []).push(r);
        });
        const frag = document.createDocumentFragment();
        Object.keys(groups).sort().reverse().forEach(date => {
            frag.appendChild(createGroupDiv(date, groups[date], date === today));
        });
        document.getElementById('archive-content').appendChild(frag);
    }

    // ── Auto-refresh ─────────────────────────────────────────────────────────────
    async function refreshRecordings() {
        try {
            const resp = await fetch('/allmon3/archive/api/list');
            if (!resp.ok) return;
            const data = await resp.json();
            const newRecords = data.filter(r => !knownFilenames.has(r.filename) && r.size > 0);
            if (newRecords.length === 0) return;

            const today   = new Date().toLocaleDateString('en-CA');
            const content = document.getElementById('archive-content');
            const byDate  = {};
            newRecords.forEach(r => {
                knownFilenames.add(r.filename);
                (byDate[r.date] = byDate[r.date] || []).push(r);
            });

            Object.keys(byDate).sort().reverse().forEach(date => {
                const recs     = byDate[date].sort((a, b) => b.filename.localeCompare(a.filename));
                const existing = content.querySelector(`.date-group[data-date="${date}"]`);
                if (existing) {
                    const tbody = existing.querySelector('tbody');
                    recs.forEach(r => {
                        const tmp = document.createElement('table');
                        tmp.innerHTML = '<tbody>' + buildRowHtml(r) + '</tbody>';
                        const src = tmp.querySelector('tbody');
                        while (src.firstChild) tbody.insertBefore(src.firstChild, tbody.firstChild);
                    });
                    const total = tbody.querySelectorAll('tr:not(.player-row)').length;
                    existing.querySelector('.rec-count').textContent =
                        `(${total} transmission${total !== 1 ? 's' : ''})`;
                    if (date === today) {
                        const body = existing.querySelector('.group-body');
                        if (body.style.display === 'none') {
                            body.style.display = '';
                            existing.querySelector('.chevron').textContent = '▾';
                        }
                    }
                } else {
                    const newDiv = createGroupDiv(date, recs, date === today);
                    const groups = content.querySelectorAll('.date-group');
                    let inserted = false;
                    for (const g of groups) {
                        if (g.dataset.date < date) {
                            content.insertBefore(newDiv, g); inserted = true; break;
                        }
                    }
                    if (!inserted) content.appendChild(newDiv);
                }
            });
        } catch (e) { /* silently ignore */ }
    }

    // ── Settings panel ───────────────────────────────────────────────────────────
    function populateSettings(data) {
        document.getElementById('days-to-keep').value = data.days_to_keep;
        document.getElementById('sched-freq').value   = data.schedule_frequency || 'weekly';
        document.getElementById('sched-dow').value    = data.schedule_dow ?? 0;
        document.getElementById('sched-hour').value   = data.schedule_hour ?? 3;
        updateSchedUI();

        const du = document.getElementById('disk-usage');
        if (data.recordings_size != null) {
            const free = data.disk_free != null ? ` · ${fmtBytes(data.disk_free)} free` : '';
            du.textContent = `Recordings: ${fmtBytes(data.recordings_size)}${free}`;
        }

        const footer = document.getElementById('settings-footer');
        if (data.conf_exists) {
            footer.textContent = 'Config: /etc/asterisk/scripts/cleanup-recordings/cleanup-recordings.conf';
        } else {
            footer.innerHTML = '<span class="text-warning">&#9888; Config file not found — re-run installer.</span>';
        }
        document.getElementById('settings-panel').style.display = '';
    }

    async function saveSettings() {
        const status = document.getElementById('save-status');
        status.textContent = 'Saving…'; status.className = 'text-muted';
        try {
            const resp = await fetch('/allmon3/archive/api/settings', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    days_to_keep:       parseInt(document.getElementById('days-to-keep').value),
                    schedule_frequency: document.getElementById('sched-freq').value,
                    schedule_dow:       parseInt(document.getElementById('sched-dow').value),
                    schedule_hour:      parseInt(document.getElementById('sched-hour').value),
                }),
            });
            if (resp.ok) {
                status.textContent = '✓ Saved'; status.className = 'text-success';
            } else {
                const err = await resp.json().catch(() => ({}));
                status.textContent = 'Error: ' + (err.detail || resp.status);
                status.className = 'text-danger';
            }
        } catch (e) {
            status.textContent = 'Error: ' + e.message; status.className = 'text-danger';
        }
        setTimeout(() => { status.textContent = ''; }, 4000);
    }

    async function runNow() {
        const status = document.getElementById('run-status');
        status.textContent = 'Signaling…'; status.className = 'text-muted';
        try {
            const resp = await fetch('/allmon3/archive/api/run-cleanup', {method:'POST'});
            if (resp.ok) {
                status.textContent = '✓ Triggered — runs within ~60 s';
                status.className = 'text-success';
            } else {
                const err = await resp.json().catch(() => ({}));
                status.textContent = 'Error: ' + (err.detail || resp.status);
                status.className = 'text-danger';
            }
        } catch (e) {
            status.textContent = 'Error: ' + e.message; status.className = 'text-danger';
        }
        setTimeout(() => { status.textContent = ''; }, 6000);
    }

    function setTitle(info) {
        const node = info && info.node ? info.node : '';
        const cs   = info && info.callsign ? info.callsign : '';
        let title;
        if (cs && node)  title = '\u{1F3A7} ' + cs + ' Audio Archive — Node ' + node;
        else if (node)   title = '\u{1F3A7} Node ' + node + ' Audio Archive';
        else             title = '\u{1F3A7} Audio Archive';
        document.getElementById('page-title').textContent = title;
        document.title = title.replace(/\u{1F3A7}\s*/u, '');
    }

    (async function () {
        try {
            const [infoResp, listResp, settingsResp] = await Promise.all([
                fetch('/allmon3/archive/api/info'),
                fetch('/allmon3/archive/api/list'),
                fetch('/allmon3/archive/api/settings'),
            ]);

            if (listResp.status === 401 || infoResp.status === 401) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status-text').innerHTML =
                    '<span class="text-warning">&#9888; Please log in to Allmon3 to view recordings.</span>'
                    + '<br><a href="/allmon3/" class="btn btn-outline-secondary btn-sm mt-2">Go to Allmon3</a>';
                return;
            }

            if (!listResp.ok) throw new Error('HTTP ' + listResp.status);

            const [info, data, settings] = await Promise.all([
                infoResp.json(), listResp.json(),
                settingsResp.ok ? settingsResp.json() : Promise.resolve(null),
            ]);

            setTitle(info);
            document.getElementById('status').style.display = 'none';

            if (data.length === 0) {
                document.getElementById('archive-content').innerHTML =
                    '<p class="text-muted">No recordings found.</p>';
            } else {
                buildContent(data);
                document.getElementById('list-controls').style.display = 'block';
                setInterval(refreshRecordings, 60000);
            }

            if (settings) populateSettings(settings);

        } catch (e) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status-text').innerHTML =
                '<span class="text-danger">Error loading recordings: ' + e.message + '</span>';
        }
    })();
</script>
</body>
</html>
